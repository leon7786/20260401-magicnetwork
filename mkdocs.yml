site_name: 代理客户端导航 / Proxy Client Guide
site_url: https://leon7786.github.io/20260401-magicnetwork/
repo_url: https://github.com/leon7786/20260401-magicnetwork
repo_name: leon7786/20260401-magicnetwork

docs_dir: content

extra_css:
  - assets/stylesheets/n8n-like.css

extra_javascript:
  - assets/javascripts/download-latest.js
  - assets/javascripts/i18n-render.js

theme:
  name: material
  custom_dir: content/overrides
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

nav:
  - Windows:
      - Clash Verge: windows/clash-verge/README.md
      - Mihomo Party: windows/mihomo-party/README.md
      - HiddifyNext: windows/hiddifynext/README.md
      - NekoRay: windows/nekoray/README.md
      - v2rayN: windows/v2rayn/README.md
      - FlClash: windows/flclash/README.md
      - Clash Nyanpasu（只支持 SS）: windows/clash-nyanpasu/README.md
      - Karing（模拟客户端）: windows/karing/README.md
  - macOS:
      - Mihomo Party: macos/mihomo-party/README.md
      - Clash Verge: macos/clash-verge/README.md
      - HiddifyNext: macos/hiddifynext/README.md
      - FlClash: macos/flclash/README.md
      - Clash Nyanpasu（只支持 SS）: macos/clash-nyanpasu/README.md
      - ClashX: macos/clashx/README.md
  - 📱 Android:
      - Clash Meta for Android: android/clash-meta-for-android/README.md
      - v2rayNG: android/v2rayng/README.md
      - NekoBox for Android: android/nekobox-for-android/README.md
      - HiddifyNext: android/hiddifynext/README.md
      - Surfboard: android/surfboard/README.md
      - Karing（模拟客户端）: android/karing/README.md
  - 📱 iOS:
      - Shadowrocket（付费）: ios/shadowrocket/README.md
      - Quantumult X（付费）: ios/quantumult-x/README.md
      - sing-box（免费）: ios/sing-box/README.md
      - HiddifyNext（免费）: ios/hiddifynext/README.md
      - Stash（付费）: ios/stash/README.md
