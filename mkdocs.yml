site_name: 代理客户端导航 / Proxy Client Guide
site_url: https://leon7786.github.io/20260401-magicnetwork/
repo_url: https://github.com/leon7786/20260401-magicnetwork
repo_name: leon7786/20260401-magicnetwork

docs_dir: content

extra_css:
  - assets/stylesheets/n8n-like.css

extra_javascript:
  - assets/javascripts/download-latest.js
  - assets/javascripts/i18n-render.js

theme:
  name: material
  custom_dir: content/overrides
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
