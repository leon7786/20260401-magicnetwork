site_name: 代理客户端导航 / Proxy Client Guide
site_url: https://leon7786.github.io/20260401-magicnetwork/
repo_url: https://github.com/leon7786/20260401-magicnetwork
repo_name: leon7786/20260401-magicnetwork

docs_dir: docs

extra_css:
  - assets/stylesheets/n8n-like.css

extra_javascript:
  - assets/javascripts/download-latest.js
  - assets/javascripts/i18n-render.js

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate

nav:
  - Windows / Desktop:
      - Clash Verge: windows/clash-verge/clash-verge.md
      - Mihomo Party: windows/mihomo-party/mihomo-party.md
      - FlClash: windows/flclash/flclash.md
      - Clash Nyanpasu: windows/clash-nyanpasu/clash-nyanpasu.md
      - HiddifyNext: windows/hiddifynext/hiddifynext.md
      - NekoRay / Nekoray: windows/nekoray/nekoray.md
      - Karing: windows/karing/karing.md
      - v2rayN: windows/v2rayn/v2rayn.md
  - Android:
      - v2rayNG: android/v2rayng/v2rayng.md
      - Clash Meta for Android: android/clash-meta-for-android/clash-meta-for-android.md
      - NekoBox for Android: android/nekobox-for-android/nekobox-for-android.md
      - HiddifyNext: android/hiddifynext/hiddifynext.md
      - Karing: android/karing/karing.md
      - Surfboard: android/surfboard/surfboard.md
  - macOS:
      - Mihomo Party: macos/mihomo-party/mihomo-party.md
